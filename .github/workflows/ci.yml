name: CI

on:
  pull_request:
  push:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux packet capture and routing tooling
        run: sudo apt-get update && sudo apt-get install -y tcpdump iproute2 iptables
      - name: Run Linux contract and differential suite
        run: make test
      - name: Run sanitizer suite
        run: make test-sanitize

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux packet capture and routing tooling
        run: sudo apt-get update && sudo apt-get install -y tcpdump iproute2 iptables
      - name: Run full nightly verification
        run: |
          make test
          make test-sanitize
          make fuzz-packets
          make bench-smoke
