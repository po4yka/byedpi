name: CI

on:
  pull_request:
  push:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install Linux packet capture and routing tooling
        run: sudo apt-get update && sudo apt-get install -y tcpdump iproute2 iptables mingw-w64
      - name: Run Rust-owned Linux cutover gates
        run: make cutover-gates
      - name: Run Windows cross-target Rust check
        run: make test-windows-cross-check

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install Linux packet capture and routing tooling
        run: sudo apt-get update && sudo apt-get install -y tcpdump iproute2 iptables mingw-w64
      - name: Run full nightly verification
        run: |
          make cutover-gates
          make test-windows-cross-check
          make transition-runtime-gates
          make transition-safety-gates
          make fuzz-packets
